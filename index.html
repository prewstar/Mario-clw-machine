<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Plushie Claw Machine & Mini-Game</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 5px;
            color: #e52521;
            text-shadow: 2px 2px #fbd000;
            margin-top: 0;
        }

        #instructions {
            margin-bottom: 15px;
            font-size: 14px;
            color: #ddd;
            text-align: center;
            height: 20px;
        }

        #scoreboard {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            background: #333;
            padding: 5px 15px;
            border-radius: 5px;
            border: 2px solid #fbd000;
        }

        /* The Game Arcade Cabinet */
        #machine {
            position: relative;
            width: 500px;
            height: 600px;
            background-color: #4370db;
            border: 10px solid #1c3366;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Glass Viewing Screen Area */
        #screen-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 480px;
            border-bottom: 8px solid #1c3366;
            overflow: hidden;
        }

        /* Screen 1: The Claw Machine View */
        #claw-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #111 0%, #1a2a4a 100%);
            display: block;
        }

        /* Screen 2: Donkey Kong Mini Game View */
        #minigame-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
        }

        #glass-area-sheen::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
            z-index: 20;
        }

        /* Claw Machine Elements */
        #chute {
            position: absolute;
            bottom: 0;
            left: 15px;
            width: 90px;
            height: 100px;
            background-color: #111;
            border: 4px solid #555;
            border-bottom: none;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            z-index: 2;
        }

        #chute-wall {
            position: absolute;
            bottom: 0;
            left: 109px;
            width: 6px;
            height: 130px;
            background-color: #666;
            z-index: 2;
        }

        #rail {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #888;
            border-bottom: 2px solid #555;
            z-index: 5;
        }

        #trolley {
            position: absolute;
            top: 16px;
            left: 200px;
            width: 50px;
            height: 16px;
            background-color: #fbd000;
            border: 2px solid #333;
            border-radius: 3px;
            z-index: 6;
            transition: left 0.05s linear;
        }

        #string {
            position: absolute;
            top: 32px;
            left: 224px;
            width: 2px;
            height: 30px;
            background-color: #fff;
            z-index: 5;
        }

        #claw {
            position: absolute;
            top: 62px;
            left: 210px;
            width: 30px;
            height: 30px;
            z-index: 6;
        }

        .claw-part {
            position: absolute;
            top: 0;
            width: 6px;
            height: 25px;
            background-color: #d1d1d1;
            border: 2px solid #444;
            border-radius: 5px;
            transform-origin: top center;
            transition: transform 0.3s ease;
        }
        #claw-left { left: 4px; transform: rotate(-15deg); }
        #claw-right { right: 4px; transform: rotate(15deg); }
        #claw-base {
            position: absolute;
            top: 0; left: 7px; width: 16px; height: 8px;
            background-color: #e52521; border: 2px solid #333; border-radius: 2px;
        }

        .claw-closed #claw-left { transform: rotate(20deg); }
        .claw-closed #claw-right { transform: rotate(-20deg); }

        .plushie {
            position: absolute;
            width: 55px;
            height: 55px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 3;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.4));
        }

        /* Mini-Game Elements */
        .platform {
            position: absolute;
            height: 12px;
            background-color: #e52521;
            border-top: 3px solid #ff7b78;
            box-sizing: border-box;
        }

        #dk-mario {
            position: absolute;
            width: 16px;
            height: 24px;
            background-color: #e52521; 
            border: 2px solid #fbd000; 
            box-sizing: border-box;
        }

        #dk-boss {
            position: absolute;
            top: 45px;
            left: 40px;
            width: 50px;
            height: 45px;
            background-color: #663300; 
            border: 3px solid #ff9933;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
        }

        .barrel {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #d28541; 
            border: 2px dashed #5c330e;
            border-radius: 50%;
            box-sizing: border-box;
        }

        /* Lower Control Panel Graphic */
        #control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background-color: #e52521;
            z-index: 10;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 5px solid #b01b18;
        }

        .joystick-base {
            width: 60px;
            height: 20px;
            background: #333;
            border-radius: 5px;
            position: relative;
        }
        .joystick-stick {
            width: 8px;
            height: 40px;
            background: #aaa;
            position: absolute;
            bottom: 10px;
            left: 26px;
            transform-origin: bottom center;
        }
        .joystick-knob {
            width: 22px;
            height: 22px;
            background: #00a230;
            border-radius: 50%;
            position: absolute;
            top: -15px;
            left: -7px;
        }

        .big-button {
            width: 50px;
            height: 50px;
            background-color: #fbd000;
            border-radius: 50%;
            border: 4px solid #b89900;
            box-shadow: 0 4px #967d00;
        }
    </style>
</head>
<body>

    <h1>MARIO PLUSHIE CLAW CRANE</h1>
    <div id="instructions">Use A & D Keys to move. Press S Key to drop the claw!</div>
    <div id="scoreboard">Score: <span id="score">0</span></div>

    <div id="machine">
        <div id="screen-container" id="glass-area-sheen">
            
            <div id="claw-view">
                <div id="rail"></div>
                <div id="trolley"></div>
                <div id="string"></div>
                
                <div id="claw">
                    <div id="claw-base"></div>
                    <div id="claw-left" class="claw-part"></div>
                    <div id="claw-right" class="claw-part"></div>
                </div>

                <div id="chute"></div>
                <div id="chute-wall"></div>
                <div id="plushies-container"></div>
            </div>

            <div id="minigame-view">
                <div id="dk-boss">DK</div>
                <div id="dk-mario"></div>
                <div id="mg-platforms"></div>
                <div id="mg-barrels"></div>
            </div>

        </div>

        <div id="control-panel">
            <div class="joystick-base">
                <div class="joystick-stick" id="stick">
                    <div class="joystick-knob"></div>
                </div>
            </div>
            <div class="big-button"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const instructions = document.getElementById('instructions');
        const clawView = document.getElementById('claw-view');
        const minigameView = document.getElementById('minigame-view');
        const scoreDisplay = document.getElementById('score');
        const stick = document.getElementById('stick');

        // Claw view elements
        const trolley = document.getElementById('trolley');
        const string = document.getElementById('string');
        const claw = document.getElementById('claw');
        const container = document.getElementById('plushies-container');

        // Mini-game elements
        const mgMario = document.getElementById('dk-mario');
        const platformContainer = document.getElementById('mg-platforms');
        const barrelContainer = document.getElementById('mg-barrels');

        // Global Game States
        let score = 0;
        let activeMode = "claw"; 
        let keys = {};

        // Claw Machine Config Variables
        let clawX = 225;
        let clawY = 62;
        let clawState = "idle"; 
        const minX = 115;
        const maxX = 445;
        const homeX = 45;  
        const groundY = 405; 
        const ceilingY = 62;
        let plushies = [];
        let grabbedPlushie = null;

        const plushieImages = [
            "plush1.png", "plush2.png", "plush3.png", "plush4.png", "plush5.png",
            "plush6.png", "plush7.png", "plush8.png", "plush9.png", "plush10.png",
            "plush11.png", "plush12.png", "plush13.png", "plush14.png", "plush15.png",
            "plush16.png", "plush17.png", "plush18.png", "plush19.png", "plush20.png"
        ];

        // Mini Game State Variables
        let marioX = 240;
        let marioY = 430;
        let marioVy = 0;
        let marioIsJumping = false;
        let barrels = [];
        let spawnBarrelTimer = 0;

        // Platforms Layout
        const platforms = [
            { x: 0, y: 460, w: 500 },   
            { x: 0, y: 370, w: 400 },   
            { x: 100, y: 280, w: 400 },  
            { x: 0, y: 190, w: 380 },   
            { x: 120, y: 100, w: 260 }   
        ];

        // Map both lowercase and uppercase variations just in case caps lock is on
        window.addEventListener('keydown', e => { 
            let key = e.key.toLowerCase();
            keys[key] = true; 
        });
        window.addEventListener('keyup', e => { 
            let key = e.key.toLowerCase();
            keys[key] = false; 
            if (key === 'a' || key === 'd') {
                stick.style.transform = "rotate(0deg)";
            }
        });

        // Setup Claw Machine Plushies
        function spawnPlushies() {
            container.innerHTML = "";
            plushies = [];
            for (let i = 0; i < 15; i++) {
                const plushie = document.createElement('div');
                plushie.className = 'plushie';
                const x = 125 + Math.random() * 310;
                const y = groundY + 10 - (Math.random() * 25); 
                const randomImage = plushieImages[Math.floor(Math.random() * plushieImages.length)];
                
                plushie.style.left = x + 'px';
                plushie.style.top = y + 'px';
                plushie.style.backgroundImage = `url('${randomImage}')`;
                
                container.appendChild(plushie);
                plushies.push({ element: plushie, x: x, y: y, width: 55, height: 55 });
            }
        }

        // Initialize Mini-Game Layout
        function buildMiniGameLayout() {
            platformContainer.innerHTML = "";
            platforms.forEach(p => {
                const plat = document.createElement('div');
                plat.className = 'platform';
                plat.style.left = p.x + 'px';
                plat.style.top = p.y + 'px';
                plat.style.width = p.w + 'px';
                platformContainer.appendChild(plat);
            });
        }

        function startMiniGame() {
            activeMode = "minigame";
            clawView.style.display = "none";
            minigameView.style.display = "block";
            instructions.innerHTML = "🔴 <b>MINI-GAME!</b> A & D to run, <b>W to Jump</b> over Barrels! Reach the top!";
            
            marioX = 30;
            marioY = 460 - 24; 
            marioVy = 0;
            marioIsJumping = false;
            
            barrels = [];
            barrelContainer.innerHTML = "";
            spawnBarrelTimer = 0;
            buildMiniGameLayout();
        }

        function endMiniGame(won) {
            activeMode = "claw";
            minigameView.style.display = "none";
            clawView.style.display = "block";
            instructions.innerHTML = "Use A & D Keys to move. Press S Key to drop the claw!";
            
            if (won) {
                score += 5; 
                scoreDisplay.innerText = score;
                alert("You beat Donkey Kong! Earning +5 Bonus Points!");
            }
            keys = {};
        }

        // Primary Core Loop
        function update() {
            if (activeMode === "claw") {
                runClawMachineLogic();
            } else {
                runMiniGameLogic();
            }
            requestAnimationFrame(update);
        }

        // --- GAME SYSTEM 1: CLAW ---
        function runClawMachineLogic() {
            trolley.style.left = (clawX - 24) + 'px';
            string.style.left = (clawX) + 'px';
            string.style.height = (clawY - 32) + 'px';
            claw.style.left = (clawX - 15) + 'px';
            claw.style.top = clawY + 'px';

            if (grabbedPlushie) {
                grabbedPlushie.x = clawX - 12;
                grabbedPlushie.y = clawY + 20;
                grabbedPlushie.element.style.left = grabbedPlushie.x + 'px';
                grabbedPlushie.element.style.top = grabbedPlushie.y + 'px';
            }

            switch (clawState) {
                case "idle":
                    claw.classList.remove('claw-closed');
                    if (keys['a'] && clawX > minX) {
                        clawX -= 3;
                        stick.style.transform = "rotate(-20deg)";
                    } else if (keys['d'] && clawX < maxX) {
                        clawX += 3;
                        stick.style.transform = "rotate(20deg)";
                    }
                    if (keys['s']) clawState = "dropping";
                    break;

                case "dropping":
                    clawY += 4;
                    let hitPlushie = null;
                    for (let p of plushies) {
                        if (clawX > p.x && clawX < p.x + p.width && (clawY + 30) >= p.y && (clawY + 30) <= p.y + 15) {
                            hitPlushie = p;
                            break;
                        }
                    }
                    if (hitPlushie || clawY >= groundY) {
                        clawState = "grabbing";
                        claw.classList.add('claw-closed');
                        if (hitPlushie && Math.random() < 0.75) grabbedPlushie = hitPlushie;
                        setTimeout(() => { clawState = "retracting"; }, 600);
                    }
                    break;

                case "retracting":
                    clawY -= 3;
                    if (clawY <= ceilingY) {
                        clawY = ceilingY;
                        clawState = "returning";
                    }
                    break;

                case "returning":
                    if (clawX > homeX) {
                        clawX -= 3;
                    } else {
                        clawX = homeX;
                        clawState = "dropping_prize";
                    }
                    break;

                case "dropping_prize":
                    claw.classList.remove('claw-closed');
                    if (grabbedPlushie) {
                        let p = grabbedPlushie;
                        grabbedPlushie = null;
                        
                        let dropInterval = setInterval(() => {
                            p.y += 5;
                            p.element.style.top = p.y + 'px';
                            if (p.y >= groundY + 50) {
                                clearInterval(dropInterval);
                                p.element.remove();
                                plushies = plushies.filter(item => item !== p);
                                
                                score += 1;
                                scoreDisplay.innerText = score;
                                
                                if (plushies.length === 0) spawnPlushies();
                                
                                if (score > 0 && score % 5 === 0) {
                                    setTimeout(() => { startMiniGame(); }, 1000);
                                }
                            }
                        }, 20);
                    }
                    setTimeout(() => { clawState = "idle"; }, 800);
                    break;
            }
        }

        // --- GAME SYSTEM 2: MARIO VS DONKEY KONG ---
        function runMiniGameLogic() {
            if (keys['a']) {
                marioX -= 2.5;
                stick.style.transform = "rotate(-20deg)";
            } else if (keys['d']) {
                marioX += 2.5;
                stick.style.transform = "rotate(20deg)";
            }

            if (marioX < 0) marioX = 0;
            if (marioX > 484) marioX = 484;

            marioVy += 0.45; 
            marioY += marioVy;

            // WASD UPDATE: "w" triggers the jump
            if (keys['w'] && !marioIsJumping) {
                marioVy = -8.5; 
                marioIsJumping = true;
            }

            let onPlatform = false;
            let currentFootY = marioY + 24;

            for (let p of platforms) {
                if (marioX + 16 > p.x && marioX < p.x + p.w) {
                    if (currentFootY >= p.y && currentFootY - marioVy <= p.y + 12) {
                        marioY = p.y - 24;
                        marioVy = 0;
                        marioIsJumping = false;
                        onPlatform = true;
                        break;
                    }
                }
            }

            if (marioY > 480) {
                marioX = 30;
                marioY = 460 - 24;
                marioVy = 0;
                marioIsJumping = false;
            }

            mgMario.style.left = marioX + 'px';
            mgMario.style.top = marioY + 'px';

            if (marioY <= 100 && marioX >= 120 && marioX <= 380) {
                endMiniGame(true);
                return;
            }

            spawnBarrelTimer++;
            if (spawnBarrelTimer > 110) { 
                spawnBarrelTimer = 0;
                
                const barrelElement = document.createElement('div');
                barrelElement.className = 'barrel';
                barrelContainer.appendChild(barrelElement);

                barrels.push({
                    element: barrelElement,
                    x: 130,
                    y: 86,
                    currentPlatIdx: 4, 
                    direction: 1       
                });
            }

            for (let i = barrels.length - 1; i >= 0; i--) {
                let b = barrels[i];
                let currentPlat = platforms[b.currentPlatIdx];

                b.x += (2 * b.direction);
                b.y = currentPlat.y - 14; 

                b.element.style.left = b.x + 'px';
                b.element.style.top = b.y + 'px';

                if (b.direction === 1 && b.x > currentPlat.x + currentPlat.w) {
                    if (b.currentPlatIdx > 0) {
                        b.currentPlatIdx--;
                        b.direction = -1; 
                        b.y = platforms[b.currentPlatIdx].y - 14;
                    } else {
                        b.element.remove();
                        barrels.splice(i, 1);
                        continue;
                    }
                } else if (b.direction === -1 && b.x < currentPlat.x) {
                    if (b.currentPlatIdx > 0) {
                        b.currentPlatIdx--;
                        b.direction = 1; 
                        b.y = platforms[b.currentPlatIdx].y - 14;
                    } else {
                        b.element.remove();
                        barrels.splice(i, 1);
                        continue;
                    }
                }

                if (b.x + 14 > marioX && b.x < marioX + 16 && b.y + 14 > marioY && b.y < marioY + 24) {
                    alert("Ouch! Hit by a barrel! Back to the bottom floor!");
                    marioX = 30;
                    marioY = 460 - 24;
                    marioVy = 0;
                    marioIsJumping = false;
                }
            }
        }

        spawnPlushies();
        update();
    </script>
</body>
</html>
